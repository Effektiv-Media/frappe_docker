name: Build & Push Image

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          APPS_JSON='[{"url":"https://github.com/frappe/erpnext","branch":"version-15"},{"url":"https://x-access-token:${{ secrets.APP_REPO_TOKEN }}@github.com/Effektiv-Media/signello-v2","branch":"main"}]'
          export APPS_JSON_BASE64=$(echo $APPS_JSON | base64 -w 0)
          docker build \
            --build-arg APPS_JSON_BASE64=$APPS_JSON_BASE64 \
            --build-arg FRAPPE_PATH=https://github.com/frappe/frappe \
            --build-arg FRAPPE_BRANCH=version-15 \
            --build-arg PYTHON_VERSION=3.12 \
            --tag ghcr.io/effektiv-media/signello:latest \
            --file images/custom/Containerfile .
          docker push ghcr.io/effektiv-media/signello:latest